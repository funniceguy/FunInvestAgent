name: "FunInvestAgent"
version: "0.1.0"
created_at: "2026-06-28 KST"
language: "ko-KR"
default_currency: "KRW"
mission: "사용자의 재무 상황, 시장 데이터, 법률 및 규제 리스크를 함께 검토해 실행 가능한 재테크 전략 보고서를 생성한다."
memory_roots:
  - "../funmemory/rules"
  - "../funmemory/domains"
  - "../funmemory/sources"
  - "../funmemory/schemas"
output_roots:
  - "../funoutput/sessions"
  - "../funoutput/reports"
  - "../funoutput/reviews"
  - "../funoutput/logs"
agents:
  - id: "session_manager"
    file: "../agents/session_manager_agent.md"
    owns:
      - "intake"
      - "scope"
      - "session_log"
  - id: "financial_partner"
    file: "../agents/financial_partner_agent.md"
    owns:
      - "personal_finance"
      - "goal_alignment"
      - "cashflow"
  - id: "market_research"
    file: "../agents/market_research_agent.md"
    owns:
      - "asset_class_research"
      - "macro_context"
      - "source_validation"
  - id: "portfolio_strategy"
    file: "../agents/portfolio_strategy_agent.md"
    owns:
      - "allocation"
      - "scenario_strategy"
      - "rebalancing"
  - id: "risk_compliance"
    file: "../agents/risk_compliance_agent.md"
    owns:
      - "risk_flags"
      - "suitability"
      - "disclosure"
  - id: "legal_review"
    file: "../agents/legal_review_agent.md"
    owns:
      - "legal_issue_spotting"
      - "jurisdiction"
      - "professional_review_gate"
  - id: "report_writer"
    file: "../agents/report_writer_agent.md"
    owns:
      - "report"
      - "executive_summary"
      - "validation_notes"
skill_catalog:
  orchestrators:
    - id: "stock_strategy_orchestrator"
      file: "../skills/stocks/stock_orchestrator.md"
      registry: "../skills/stocks/stock_skill_composition_registry.yaml"
      use_for:
        - "주식 단타와 가치투자 혼합 전략 수립"
        - "현재 시점 주식 행동과 자금 배분 리포트"
        - "기존 주식 전략 성과 검토와 재수정"
  stock_subskills:
    - "stock_intake_scope"
    - "stock_data_collection"
    - "stock_forward_source_search"
    - "stock_forward_evidence_extraction"
    - "stock_forward_outlook_synthesis"
    - "stock_information_event_psychology"
    - "stock_investor_psychology"
    - "stock_market_regime"
    - "stock_universe_screening"
    - "stock_psychology_decision_gate"
    - "stock_aggressive_short_term_probability"
    - "stock_intraday_psychology_routine"
    - "stock_leverage_product_risk"
    - "stock_leverage_psychology_warfare"
    - "stock_leverage_risk_gate"
    - "stock_3x_leverage_tactical"
    - "stock_leverage_verification_contract"
    - "stock_short_term_tactical"
    - "stock_value_investing"
    - "stock_portfolio_construction"
    - "stock_execution_risk"
    - "stock_verification_contract"
    - "stock_report_generation"
    - "stock_performance_review"
quality_gates:
  - "user_goal_defined"
  - "risk_tolerance_defined"
  - "liquidity_checked"
  - "sources_checked"
  - "legal_issues_checked"
  - "stock_strategy_review_defined"
  - "investor_psychology_gate_passed"
  - "leverage_risk_gate_passed"
  - "verification_score_passed"
  - "report_validated"
