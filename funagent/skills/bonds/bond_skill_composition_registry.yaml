version: 1
external_prerequisites:
  - id: "cash_deposit_bond_substitution_gate"
    file: "../cash/cash_deposit_bond_substitution_gate_skill.md"
    required_for: "all_assemblies"
  - id: "cash_deposit_verification_contract"
    file: "../cash/cash_deposit_verification_contract_skill.md"
    required_for: "all_assemblies"
skills:
  - id: "bond_intake_scope"
    file: "bond_intake_scope_skill.md"
    output_object: "bond_intake_scope"
  - id: "bond_source_search"
    file: "bond_source_search_skill.md"
    output_object: "bond_source_coverage"
  - id: "bond_evidence_extraction"
    file: "bond_evidence_extraction_skill.md"
    output_object: "bond_evidence_cards"
  - id: "bond_market_regime_curve"
    file: "bond_market_regime_curve_skill.md"
    output_object: "bond_curve_regime"
  - id: "bond_security_fund_analysis"
    file: "bond_security_fund_analysis_skill.md"
    output_object: "bond_security_fund_analysis"
  - id: "bond_credit_liquidity_risk_gate"
    file: "bond_credit_liquidity_risk_gate_skill.md"
    output_object: "bond_risk_gate"
  - id: "bond_ladder_liability_matching"
    file: "bond_ladder_liability_matching_skill.md"
    output_object: "bond_ladder_plan"
  - id: "bond_portfolio_integration"
    file: "bond_portfolio_integration_skill.md"
    output_object: "stock_bond_portfolio_plan"
  - id: "bond_verification_contract"
    file: "bond_verification_contract_skill.md"
    output_object: "bond_verification_scorecard"
assemblies:
  - id: "individual_bond_ladder"
    sequence:
      - "bond_intake_scope"
      - "bond_source_search"
      - "bond_evidence_extraction"
      - "bond_market_regime_curve"
      - "bond_security_fund_analysis"
      - "bond_credit_liquidity_risk_gate"
      - "bond_ladder_liability_matching"
      - "bond_portfolio_integration"
      - "bond_verification_contract"
  - id: "bond_etf_income"
    sequence:
      - "bond_intake_scope"
      - "bond_source_search"
      - "bond_evidence_extraction"
      - "bond_market_regime_curve"
      - "bond_security_fund_analysis"
      - "bond_credit_liquidity_risk_gate"
      - "bond_portfolio_integration"
      - "bond_verification_contract"
  - id: "duration_tactical"
    sequence:
      - "bond_intake_scope"
      - "bond_source_search"
      - "bond_evidence_extraction"
      - "bond_market_regime_curve"
      - "bond_security_fund_analysis"
      - "bond_credit_liquidity_risk_gate"
      - "bond_portfolio_integration"
      - "bond_verification_contract"
  - id: "stock_bond_long_term"
    sequence:
      - "bond_intake_scope"
      - "bond_source_search"
      - "bond_evidence_extraction"
      - "bond_market_regime_curve"
      - "bond_security_fund_analysis"
      - "bond_credit_liquidity_risk_gate"
      - "bond_ladder_liability_matching"
      - "bond_portfolio_integration"
      - "bond_verification_contract"
  - id: "bond_review_rebuild"
    sequence:
      - "bond_source_search"
      - "bond_evidence_extraction"
      - "bond_market_regime_curve"
      - "bond_security_fund_analysis"
      - "bond_credit_liquidity_risk_gate"
      - "bond_ladder_liability_matching"
      - "bond_portfolio_integration"
      - "bond_verification_contract"
