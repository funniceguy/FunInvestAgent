orchestrator:
  id: "stock_strategy_orchestrator"
  file: "stock_orchestrator.md"
  purpose: "자본보전·손실회복을 최우선으로 두고 국내·미국 전수 성과, 잠재 물량, 급등·순환 사이클을 반복 검증한다."
external_prerequisites:
  - id: "cash_deposit_orchestrator"
    file: "../cash/cash_deposit_orchestrator.md"
    required_for: "all_assemblies"
    purpose: "투자하지 않는 자금과 대기자금을 파킹·예적금·채권 대체재로 비교한다."
  - id: "cash_deposit_bond_substitution_gate"
    file: "../cash/cash_deposit_bond_substitution_gate_skill.md"
    required_for: "all_assemblies"
    purpose: "신규 주식 기대값이 동일 기간 안전 대체수익과 위험 완충폭을 넘는지 검증한다."
  - id: "cash_deposit_verification_contract"
    file: "../cash/cash_deposit_verification_contract_skill.md"
    required_for: "all_assemblies"
    purpose: "예금보호·실제 세후수익·유동성을 독립 100점 계약으로 검증한다."
